name: build

on:
  push:
    branches: ["**"]
    tags: ["v*"]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - uses: actions/upload-artifact@v4
        with:
          name: btpad-autodisconnect-linux-x86_64
          path: target/x86_64-unknown-linux-musl/release/btpad-autodisconnect
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/x86_64-unknown-linux-musl/release/btpad-autodisconnect
          name: ${{ github.ref_name }}
          body: "Static musl binary for x86-64 Linux."
